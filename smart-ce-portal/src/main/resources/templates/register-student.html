<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Student Register')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{layout :: navbar}"></nav>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow-lg border-0 rounded-4" style="width:460px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="ce-icon-circle mx-auto mb-3" style="background:#0d6efd;">
                    <i class="bi bi-person-plus-fill fs-2 text-white"></i>
                </div>
                <h5 class="fw-bold">Student Registration</h5>
            </div>

            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

            <form th:action="@{/register/student}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" name="fullName" class="form-control"
                           placeholder="e.g. Ananya Kulkarni" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">PRN (Username)</label>
                    <input type="text" name="username" class="form-control"
                           placeholder="e.g. 2021001234" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">College Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="prn@fergusson.edu.in" required/>
                </div>
                <div class="mb-3">
    <label class="form-label fw-semibold">
        Department
    </label>

    <select name="department"
            class="form-select"
            required>

        <option value="">Select Department</option>

        <option value="Computer Science">
            Computer Science
        </option>

        <option value="Data Science">
            Data Science
        </option>

        <option value="Biotechnology">
            Biotechnology
        </option>

    </select>
</div>

<div class="mb-3">
    <label class="form-label fw-semibold">
        Program Code
    </label>

    <select name="programCode"
            class="form-select"
            required>

        <option value="">Select Program</option>

        <option value="BSCCSC">BSCCSC</option>

        <option value="MSCCSC">MSCCSC</option>

        <option value="MSCDCS">MSCDCS</option>

        <option value="BSCBTH">BSCBTH</option>

    </select>
</div>
<div class="mb-3">

    <label class="form-label fw-semibold">
        Division
    </label>

    <select name="division"
            class="form-select"
            required>

        <option value="">
            Select Division
        </option>

        <option value="A">
            A
        </option>

        <option value="B">
            B
        </option>

    </select>
</div>

<div class="mb-3">

    <label class="form-label fw-semibold">
        Class / Year
    </label>

    <select name="classYear"
            class="form-select"
            required>

        <option value="">
            Select Year
        </option>

        <option value="FY">
            FY
        </option>

        <option value="SY">
            SY
        </option>

        <option value="TY">
            TY
        </option>

    </select>

</div>
                
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Choose a strong password" required/>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-person-check me-1"></i> Register as Student
                </button>
            </form>

            <div class="text-center mt-3">
                <small>Already registered? <a th:href="@{/login}">Login here</a></small>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
