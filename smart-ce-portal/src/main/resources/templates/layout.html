<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | Smart CE Portal'">Smart CE Portal</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- ── Navbar Fragment ───────────────────────────────────────────────────── -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark ce-navbar px-4">
    <a class="navbar-brand fw-bold" href="#">
        <i class="bi bi-mortarboard-fill me-2"></i>Smart CE Portal
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-center gap-2">
            <!-- Student nav -->
            <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                <a class="nav-link" th:href="@{/student/dashboard}">
                    <i class="bi bi-grid"></i> Dashboard
                </a>
            </li>
            <!-- Teacher nav -->
            <li class="nav-item" sec:authorize="hasRole('TEACHER')">
                <a class="nav-link" th:href="@{/teacher/dashboard}">
                    <i class="bi bi-grid"></i> Dashboard
                </a>
            </li>
            <!-- Admin nav -->
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/admin/dashboard}">
                    <i class="bi bi-speedometer2"></i> Admin
                </a>
            </li>
            <!-- Logout -->
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </form>
            </li>
        </ul>
    </div>
</nav>

<!-- ── Footer Fragment ───────────────────────────────────────────────────── -->
<footer th:fragment="footer" class="ce-footer text-center py-3 mt-auto">
    <small class="text-muted">
        Smart CE Portal &copy; 2025 &mdash; Fergusson College, Pune &mdash; Estd. 1885
    </small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
