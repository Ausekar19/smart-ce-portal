<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Add Teacher')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{layout :: navbar}"></nav>

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow-lg border-0 rounded-4" style="width:460px;">
        <div class="card-header bg-warning text-dark rounded-top-4 border-0 py-3 px-4">
            <h5 class="mb-0 fw-bold">
                <i class="bi bi-person-plus me-2"></i>Add New Teacher
            </h5>
        </div>
        <div class="card-body p-4">
            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

            <form th:action="@{/admin/teacher/new}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" name="fullName" class="form-control"
                           placeholder="e.g. Prof. Anita Joshi" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Employee ID (Username)</label>
                    <input type="text" name="username" class="form-control"
                           placeholder="e.g. FC-EMP-0099" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">College Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="teacher@fergusson.edu.in" required/>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required/>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary flex-grow-1">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-warning flex-grow-1 fw-semibold">
                        <i class="bi bi-person-check me-1"></i> Create Teacher
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
