<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Manage Users')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{layout :: navbar}"></nav>

<main class="flex-grow-1 container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0"><i class="bi bi-people me-2"></i>All Users</h5>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Back
        </a>
    </div>

    <div th:if="${msg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${msg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u, uStat : ${users}">
                            <td th:text="${uStat.count}">1</td>
                            <td class="fw-semibold" th:text="${u.fullName}">Name</td>
                            <td><code th:text="${u.username}">username</code></td>
                            <td th:text="${u.email}">email</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${u.role.name() == 'ADMIN'}   ? 'bg-dark'    :
                                                      (${u.role.name() == 'TEACHER'} ? 'bg-warning text-dark' : 'bg-primary')"
                                      th:text="${u.role}">ROLE</span>
                            </td>
                            <td>
                                <span th:if="${u.enabled}"  class="badge bg-success">Active</span>
                                <span th:unless="${u.enabled}" class="badge bg-secondary">Disabled</span>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}"
                                          method="post" class="d-inline">
                                        <button class="btn btn-sm btn-outline-warning"
                                                th:title="${u.enabled ? 'Disable' : 'Enable'}">
                                            <i th:class="${u.enabled} ? 'bi bi-toggle-on' : 'bi bi-toggle-off'"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/users/{id}/delete(id=${u.id})}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Delete this user?')">
                                        <button class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
